- name: Create root build.gradle if missing
  run: |
    if [ ! -f build.gradle ]; then
      cat > build.gradle <<'EOF'
plugins {
    id 'com.android.application' version '8.1.0' apply false
}

repositories {
    google()
    mavenCentral()
}

subprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF
    fi
