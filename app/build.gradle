plugins { id 'com.android.application' }
android {
    compileSdk 34
    defaultConfig {
        applicationId "com.cool.appinstaller"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
}
